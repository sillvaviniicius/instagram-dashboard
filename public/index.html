<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard Instagram</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3452FF">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IG Dashboard">
<meta name="mobile-web-app-capable" content="yes">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#F3F4F7; --surface:#FFFFFF; --surface-2:#F1F2F6; --line:#E9EAEF;
    --accent:#3452FF; --accent-soft:rgba(52,82,255,0.09);
    --coral:#FF5A36; --mint:#00B37A; --red:#E5484D;
    --ink:#14161C; --ink-muted:#6B7280; --ink-faint:#9AA0AC;
    --radius:20px;
    --shadow: 0 1px 2px rgba(20,22,28,0.04), 0 10px 28px rgba(20,22,28,0.06);
    --shadow-hover: 0 4px 10px rgba(20,22,28,0.06), 0 16px 36px rgba(20,22,28,0.10);
  }
  [data-theme="dark"]{
    --bg:#0E1116; --surface:#171B22; --surface-2:#1E232C; --line:#2A2F3A;
    --accent:#5B7FFF; --accent-soft:rgba(91,127,255,0.14);
    --coral:#FF7A5C; --mint:#2DD4A0; --red:#FF6B6E;
    --ink:#F3F4F7; --ink-muted:#9AA1AE; --ink-faint:#6B7280;
    --shadow: 0 1px 2px rgba(0,0,0,0.2), 0 10px 28px rgba(0,0,0,0.28);
    --shadow-hover: 0 4px 10px rgba(0,0,0,0.25), 0 16px 36px rgba(0,0,0,0.35);
  }
  .theme-toggle{ background:var(--surface-2); border:none; color:var(--ink); font-size:15px; width:38px; height:38px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .theme-toggle:hover{ color:var(--accent); }
  *{box-sizing:border-box;}
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
  body{
    margin:0; background: var(--bg);
    color:var(--ink); font-family:'Inter', sans-serif;
    padding:44px 24px 90px;
    padding-top: max(44px, env(safe-area-inset-top));
    padding-left: max(24px, env(safe-area-inset-left));
    padding-right: max(24px, env(safe-area-inset-right));
    padding-bottom: max(90px, env(safe-area-inset-bottom));
    transition: background .2s ease, color .2s ease;
  }
  .wrap{ max-width:1180px; margin:0 auto; }
  .header{ display:flex; align-items:flex-start; justify-content:space-between; gap:24px; flex-wrap:wrap; padding-bottom:30px; margin-bottom:30px; }
  .profile{ display:flex; align-items:center; gap:18px; }
  .avatar{ width:60px; height:60px; border-radius:16px; background:linear-gradient(135deg, var(--accent), #7A3CFF); display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; position:relative; }
  .avatar img{ width:100%; height:100%; object-fit:cover; display:block; }
  .avatar #avatarFallback{ display:none; align-items:center; justify-content:center; width:100%; height:100%; font-family:'Space Grotesk', sans-serif; font-size:21px; font-weight:700; color:#fff; }
  .profile h1{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:24px; margin:0 0 3px; letter-spacing:-0.01em; }
  .profile .handle{ color:var(--accent); font-weight:600; font-size:13.5px; }
  .profile .bio{ color:var(--ink-muted); font-size:13px; margin-top:5px; max-width:420px; line-height:1.55; }
  .profile-stats{ display:flex; gap:26px; }
  .profile-stats div{ text-align:right; }
  .profile-stats .num{ font-family:'Space Grotesk', sans-serif; font-size:20px; font-weight:700; }
  .profile-stats .lbl{ font-size:10.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.08em; margin-top:2px; }
  .period-tag{ font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.09em; margin-top:8px; }
  .period-bar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--surface); border-radius:14px; padding:10px 14px; box-shadow:var(--shadow); margin-bottom:26px; }
  .period-presets{ display:flex; gap:6px; }
  .period-btn{ background:var(--surface-2); border:none; color:var(--ink-muted); font-size:12px; font-weight:600; padding:8px 13px; border-radius:9px; cursor:pointer; }
  .period-btn:hover{ color:var(--ink); }
  .period-btn.active{ background:var(--accent); color:#fff; }
  .period-divider{ width:1px; height:22px; background:var(--line); margin:0 2px; }
  .period-custom{ display:flex; align-items:center; gap:8px; }
  .period-custom input[type="date"]{ font-family:'Inter', sans-serif; font-size:12.5px; color:var(--ink); background:var(--surface-2); border:none; border-radius:9px; padding:7px 10px; }
  .period-custom span{ color:var(--ink-faint); font-size:12px; }
  .period-apply{ background:var(--ink); color:#fff; border:none; font-size:12px; font-weight:600; padding:8px 14px; border-radius:9px; cursor:pointer; }
  .period-apply:hover{ background:var(--accent); }
  .kpi-grid{ display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:28px; }
  .kpi-grid-auto{ grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); }
  .kpi{ background:var(--surface); border-radius:var(--radius); padding:22px 22px 20px; box-shadow:var(--shadow); }
  .kpi .lbl{ display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:12px; font-weight:600; }
  .kpi .lbl::before{ content:''; width:7px; height:7px; border-radius:50%; background:var(--accent); flex-shrink:0; }
  .kpi .val{ font-family:'Space Grotesk', sans-serif; font-size:32px; font-weight:700; line-height:1; letter-spacing:-0.01em; }
  .kpi .sub{ font-size:12px; color:var(--mint); margin-top:9px; font-weight:600; }
  .kpi .breakdown{ display:flex; flex-direction:column; gap:5px; margin-top:12px; padding-top:12px; border-top:1px solid var(--line); }
  .kpi .breakdown .b-row{ display:flex; align-items:center; justify-content:space-between; font-size:12px; }
  .kpi .breakdown .b-row .b-label{ display:flex; align-items:center; gap:6px; color:var(--ink-muted); }
  .kpi .breakdown .b-row .b-dot{ width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .kpi .breakdown .b-row .b-val{ font-weight:700; }
  .grid-2{ display:grid; grid-template-columns: 1.4fr 1fr; gap:14px; margin-bottom:14px;}
  .card{ background:var(--surface); border-radius:var(--radius); padding:26px; box-shadow:var(--shadow); }
  .card h3{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:16.5px; margin:0 0 4px; letter-spacing:-0.005em; }
  .card .desc{ font-size:12.5px; color:var(--ink-muted); margin-bottom:20px; }
  .chart-box{ position:relative; height:260px; }
  .chart-box.tall{ height:300px; }
  .section-title{ font-family:'Space Grotesk', sans-serif; font-size:18px; font-weight:700; margin:40px 0 4px; letter-spacing:-0.01em; }
  .section-desc{ font-size:12.5px; color:var(--ink-muted); margin-bottom:16px; }
  .posts-grid{ display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; }
  .post-card{ background:var(--surface); border-radius:16px; padding:16px; text-decoration:none; color:var(--ink); display:flex; flex-direction:column; gap:10px; box-shadow:var(--shadow); transition:box-shadow .15s ease, transform .15s ease; }
  .post-card:hover{ box-shadow:var(--shadow-hover); transform:translateY(-2px); }
  .post-rank{ font-family:'Space Grotesk', sans-serif; font-size:12.5px; color:var(--coral); font-weight:700; }
  .post-type{ display:inline-block; font-size:9.5px; text-transform:uppercase; letter-spacing:0.06em; font-weight:600; color:var(--accent); background:var(--accent-soft); padding:3px 8px; border-radius:20px; width:fit-content; }
  .post-caption{ font-size:12px; color:var(--ink-muted); line-height:1.4; min-height:34px; }
  .post-metrics{ display:flex; flex-direction:column; gap:5px; margin-top:auto; padding-top:10px; border-top:1px solid var(--line); }
  .post-metrics .m{ display:flex; justify-content:space-between; font-size:12px; }
  .post-metrics .m span:first-child{ color:var(--ink-faint); }
  .post-metrics .m span:last-child{ font-weight:700; }
  .footer-note{ margin-top:44px; font-size:11.5px; color:var(--ink-faint); text-align:center; }
  .state-msg{ text-align:center; padding:80px 20px; color:var(--ink-muted); font-size:14px; }
  .refresh-btn{ background:var(--surface); border:none; color:var(--ink); font-size:12px; font-weight:600; padding:9px 15px; border-radius:9px; cursor:pointer; box-shadow:var(--shadow); }
  .refresh-btn:hover{ color:var(--accent); }
  .refresh-btn:disabled{ opacity:0.6; cursor:wait; }
  .export-btn{ background:var(--ink); border:none; color:#fff; font-weight:700; font-size:12.5px; padding:11px 18px; border-radius:11px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; box-shadow:var(--shadow); }
  .export-btn:hover{ background:var(--accent); }
  .export-btn:disabled{ opacity:0.6; cursor:wait; }
  .header-actions{ display:flex; flex-direction:column; align-items:flex-end; gap:16px; }
  .grid-3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:14px; }
  .bar-row{ display:flex; align-items:center; gap:10px; margin-bottom:11px; font-size:12.5px; }
  .bar-row .bar-label{ width:76px; flex-shrink:0; color:var(--ink-muted); font-weight:500; }
  .bar-row .bar-track{ flex:1; height:7px; background:var(--surface-2); border-radius:6px; overflow:hidden; }
  .bar-row .bar-fill{ height:100%; background:var(--accent); border-radius:6px; }
  .bar-row .bar-val{ width:46px; text-align:right; flex-shrink:0; font-weight:700; }
  .best-times{ display:flex; flex-direction:column; gap:9px; }
  .best-time-row{ display:flex; align-items:center; justify-content:space-between; padding:13px 15px; background:var(--surface-2); border-radius:12px; }
  .best-time-row .rank{ font-family:'Space Grotesk', sans-serif; color:var(--coral); font-weight:700; font-size:13px; width:26px; }
  .best-time-row .info{ flex:1; }
  .best-time-row .day{ font-weight:700; font-size:13.5px; }
  .best-time-row .slot{ font-size:11.5px; color:var(--ink-muted); }
  .best-time-row .reach{ font-family:'Space Grotesk', sans-serif; font-size:16px; font-weight:700; color:var(--accent); }
  .type-cards{ display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:12px; }
  .type-card{ background:var(--surface-2); border-radius:14px; padding:15px 17px; }
  .type-card .t-name{ font-size:11px; text-transform:uppercase; letter-spacing:0.06em; font-weight:700; color:var(--coral); margin-bottom:9px; }
  .type-card .t-row{ display:flex; justify-content:space-between; font-size:12px; margin-top:5px; }
  .type-card .t-row span:first-child{ color:var(--ink-faint); }
  .type-card .t-row span:last-child{ font-weight:700; }

  /* Comparação com período anterior */
  .compare-chip{ display:inline-flex; align-items:center; gap:4px; font-size:11.5px; font-weight:700; margin-top:9px; padding:3px 8px; border-radius:20px; }
  .compare-chip.up{ color:var(--mint); background:rgba(0,179,122,0.12); }
  .compare-chip.down{ color:var(--red); background:rgba(229,72,77,0.12); }
  .compare-chip.flat{ color:var(--ink-faint); background:var(--surface-2); }
  .compare-note{ font-size:10.5px; color:var(--ink-faint); margin-top:6px; }

  /* Legenda expansível */
  .post-caption{ font-size:12px; color:var(--ink-muted); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .post-caption.expanded{ -webkit-line-clamp:unset; }
  .caption-toggle{ font-size:11px; color:var(--accent); font-weight:600; cursor:pointer; background:none; border:none; padding:0; text-align:left; }

  /* Timeline de posts */
  .timeline-scroll{ display:flex; gap:12px; overflow-x:auto; padding-bottom:8px; scroll-snap-type:x proximity; }
  .timeline-scroll::-webkit-scrollbar{ height:6px; }
  .timeline-scroll::-webkit-scrollbar-thumb{ background:var(--line); border-radius:6px; }
  .timeline-item{ scroll-snap-align:start; flex:0 0 132px; text-decoration:none; color:var(--ink); }
  .timeline-thumb{ width:132px; height:132px; border-radius:14px; background:var(--surface-2); overflow:hidden; position:relative; box-shadow:var(--shadow); }
  .timeline-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .timeline-thumb .no-thumb{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:var(--ink-faint); font-size:11px; text-align:center; padding:10px; }
  .timeline-thumb .tl-badge{ position:absolute; top:7px; left:7px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; background:rgba(20,22,28,0.65); color:#fff; padding:3px 7px; border-radius:20px; }
  .timeline-meta{ margin-top:7px; font-size:11px; }
  .timeline-meta .tl-date{ color:var(--ink-faint); }
  .timeline-meta .tl-reach{ font-weight:700; color:var(--ink); margin-top:1px; }

  /* Anotações manuais */
  .notes-form{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
  .notes-form input[type="date"]{ font-family:'Inter', sans-serif; font-size:12.5px; color:var(--ink); background:var(--surface-2); border:none; border-radius:9px; padding:9px 10px; }
  .notes-form input[type="text"]{ flex:1; min-width:200px; font-family:'Inter', sans-serif; font-size:12.5px; color:var(--ink); background:var(--surface-2); border:none; border-radius:9px; padding:9px 12px; }
  .notes-form button{ background:var(--ink); color:#fff; border:none; font-size:12px; font-weight:600; padding:9px 16px; border-radius:9px; cursor:pointer; }
  .notes-form button:hover{ background:var(--accent); }
  .notes-list{ display:flex; flex-direction:column; gap:8px; }
  .note-row{ display:flex; align-items:flex-start; gap:12px; padding:12px 14px; background:var(--surface-2); border-radius:12px; }
  .note-row .note-date{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:12.5px; color:var(--accent); flex-shrink:0; width:78px; }
  .note-row .note-text{ flex:1; font-size:12.5px; color:var(--ink); line-height:1.5; }
  .note-row .note-del{ background:none; border:none; color:var(--ink-faint); cursor:pointer; font-size:15px; flex-shrink:0; }
  .note-row .note-del:hover{ color:var(--red); }
  .notes-empty{ font-size:12.5px; color:var(--ink-faint); }
  .notes-hint{ font-size:11px; color:var(--ink-faint); margin-top:10px; }

  /* Tráfego pago */
  .ads-table-wrap{ overflow-x:auto; }
  .ads-table{ width:100%; border-collapse:collapse; font-size:12.5px; min-width:640px; }
  .ads-table th{ text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-faint); font-weight:700; padding:0 12px 10px; border-bottom:1px solid var(--line); white-space:nowrap; }
  .ads-table td{ padding:12px 12px; border-bottom:1px solid var(--line); white-space:nowrap; }
  .ads-table tr:last-child td{ border-bottom:none; }
  .ads-table .camp-name{ font-weight:700; color:var(--ink); }
  .ads-table .camp-account{ font-size:11px; color:var(--ink-faint); margin-top:2px; }
  .status-pill{ display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:3px 9px; border-radius:20px; }
  .status-pill.active{ color:var(--mint); background:rgba(0,179,122,0.12); }
  .status-pill.paused{ color:var(--ink-faint); background:var(--surface-2); }
  .status-pill.other{ color:var(--coral); background:rgba(255,90,54,0.12); }
  .ovp-compare{ display:flex; flex-direction:column; gap:16px; }
  .ovp-row{ display:flex; flex-direction:column; gap:6px; }
  .ovp-row .ovp-label{ display:flex; justify-content:space-between; font-size:12px; color:var(--ink-muted); font-weight:600; }
  .ovp-row .ovp-track{ display:flex; height:22px; border-radius:8px; overflow:hidden; background:var(--surface-2); }
  .ovp-row .ovp-organic{ background:var(--accent); }
  .ovp-row .ovp-paid{ background:var(--coral); }
  .ovp-legend{ display:flex; gap:16px; font-size:11.5px; color:var(--ink-muted); margin-top:4px; }
  .ovp-legend span{ display:inline-flex; align-items:center; gap:5px; }
  .ovp-legend .dot{ width:8px; height:8px; border-radius:50%; }
  @media (max-width: 980px){
    .kpi-grid{ grid-template-columns:repeat(2,1fr); }
    .grid-2{ grid-template-columns:1fr; }
    .posts-grid{ grid-template-columns:repeat(2,1fr); }
    .header{ flex-direction:column; align-items:flex-start; }
    .header-actions{ align-items:flex-start; width:100%; }
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="state-msg">Carregando métricas…</div>
</div>

<script>
Chart.defaults.font.family = "'Inter', sans-serif";
Chart.defaults.font.size = 11;

// Garante que o eixo X sempre mostre o primeiro e o último dia,
// distribuindo os rótulos do meio de forma uniforme (em vez do autoSkip
// padrão do Chart.js, que às vezes corta a data mais recente).
function evenTicks(desiredCount){
  return (axis) => {
    const total = axis.ticks.length;
    if (total <= desiredCount){ return; }
    const step = (total - 1) / (desiredCount - 1);
    const picked = new Set();
    for (let i = 0; i < desiredCount; i++){
      picked.add(Math.round(i * step));
    }
    axis.ticks = axis.ticks.filter((t, idx) => picked.has(idx));
  };
}
const fmtCompact = n => n>=1000 ? (n/1000).toFixed(n>=10000?0:1).replace('.0','')+'K' : n;
function fmtCurrency(value, currency){
  try {
    return new Intl.NumberFormat('pt-BR', { style:'currency', currency: currency || 'BRL' }).format(value || 0);
  } catch(e){
    return `${currency || ''} ${(value||0).toFixed(2)}`;
  }
}
const initials = name => (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

let currentRange = { from: null, to: null }; // null = padrão (últimos 30 dias)

function getStoredTheme(){
  try { return localStorage.getItem('ig-dashboard-theme') || 'light'; } catch(e){ return 'light'; }
}
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  try { localStorage.setItem('ig-dashboard-theme', theme); } catch(e){}
}
function toggleTheme(){
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  if (window.__lastData) render(window.__lastData);
}
function themeColors(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  return {
    text: isDark ? '#9AA1AE' : '#6B7280',
    grid: isDark ? 'rgba(255,255,255,0.07)' : 'rgba(20,22,28,0.06)',
  };
}
applyTheme(getStoredTheme());

function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

function toggleCaption(id, btn){
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? 'ver menos' : 'ver mais';
}

function handleThumbError(img){
  img.parentElement.innerHTML = '<div class="no-thumb">Sem imagem</div>';
}

const NOTES_KEY = 'ig-dashboard-notes';

function loadNotes(){
  try { return JSON.parse(localStorage.getItem(NOTES_KEY) || '[]'); } catch(e){ return []; }
}
function saveNotes(notes){
  try { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); } catch(e){}
}
function addNote(){
  const dateEl = document.getElementById('noteDate');
  const textEl = document.getElementById('noteText');
  const date = dateEl.value;
  const text = textEl.value.trim();
  if (!date || !text){ alert('Preencha a data e o texto da anotação.'); return; }
  const notes = loadNotes();
  notes.push({ id: Date.now().toString(36), date, text });
  saveNotes(notes);
  textEl.value = '';
  renderNotes();
}
function deleteNote(id){
  saveNotes(loadNotes().filter(n => n.id !== id));
  renderNotes();
}
function renderNotes(){
  const list = document.getElementById('notesList');
  if (!list) return;
  const notes = loadNotes().sort((a,b) => b.date.localeCompare(a.date));
  list.innerHTML = notes.length
    ? notes.map(n => `
        <div class="note-row">
          <div class="note-date">${new Date(n.date+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})}</div>
          <div class="note-text">${escapeHTML(n.text)}</div>
          <button class="note-del" onclick="deleteNote('${n.id}')" title="Excluir">✕</button>
        </div>
      `).join('')
    : '<div class="notes-empty">Nenhuma anotação ainda.</div>';
}

function toISODate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function compareChipHTML(pct){
  if (pct === null || pct === undefined) return '<div class="compare-note">sem período anterior p/ comparar</div>';
  const cls = pct > 0.5 ? 'up' : pct < -0.5 ? 'down' : 'flat';
  const arrow = cls === 'up' ? '↑' : cls === 'down' ? '↓' : '→';
  return `<div class="compare-chip ${cls}">${arrow} ${Math.abs(pct).toFixed(1)}% vs. período anterior</div>`;
}

function periodLabel(period, dayCount){
  if (!period || !period.from || !period.to) return `Últimos ${dayCount} dias`;
  const from = new Date(period.from + 'T00:00:00');
  const to = new Date(period.to + 'T00:00:00');
  const fmt = d => d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' });
  if (period.from === period.to) return fmt(from);
  return `${fmt(from)} – ${fmt(to)}`;
}

async function load(force=false){
  const app = document.getElementById('app');
  if (force) {
    document.querySelectorAll('.refresh-btn, #topRefreshBtn').forEach(el => {
      el.disabled = true;
      el.dataset.originalHtml = el.innerHTML;
      el.innerHTML = el.id === 'topRefreshBtn' ? '…' : 'Buscando dados atualizados…';
    });
  }
  try{
    const params = new URLSearchParams();
    if (force) params.set('refresh', '1');
    if (currentRange.from && currentRange.to){
      params.set('date_from', currentRange.from);
      params.set('date_to', currentRange.to);
    }
    params.set('_t', Date.now()); // evita cache de navegador/proxy intermediário
    const res = await fetch('/api/metrics?' + params.toString(), { cache: 'no-store' });
    if(!res.ok) throw new Error('Erro ' + res.status);
    const data = await res.json();
    render(data);
  }catch(err){
    app.innerHTML = `<div class="state-msg">Não foi possível carregar os dados.<br>${err.message}<br><br>
      <button class="refresh-btn" onclick="load(true)">Tentar novamente</button></div>`;
  }
}

function setPreset(days){
  const to = new Date();
  const from = new Date();
  from.setDate(from.getDate() - (days - 1));
  currentRange = { from: toISODate(from), to: toISODate(to) };
  load();
}

function applyCustomRange(){
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  if (!from || !to){ alert('Escolha as duas datas.'); return; }
  if (from > to){ alert('A data inicial precisa ser antes da data final.'); return; }
  currentRange = { from, to };
  load();
}

      <div class="post-caption" id="${capId}">${escapeHTML(p.caption).replace(/\n/g,'<br>')}</div>
      ${needsToggle ? `<button class="caption-toggle" onclick="event.preventDefault(); toggleCaption('${capId}', this);">ver mais</button>` : ''}
      <div class="post-metrics">
        ${showRate ? `<div class="m"><span>Taxa de engaj.</span><span>${p.engagementRate.toFixed(1)}%</span></div>` : `<div class="m"><span>Engajamento</span><span>${fmtCompact(p.engagement)}</span></div>`}
        <div class="m"><span>Curtidas</span><span>${fmtCompact(p.likes)}</span></div>
        <div class="m"><span>Alcance</span><span>${fmtCompact(p.reach)}</span></div>
        <div class="m"><span>Visualizações</span><span>${fmtCompact(p.views)}</span></div>
        <div class="m"><span>Salvos / Compart.</span><span>${p.saves} / ${p.shares}</span></div>
      </div>
    </a>
  `;
  };

  document.getElementById('topPosts').innerHTML = topPosts.map((p,i) => postCardHTML(p, i, false, 'top')).join('');
  document.getElementById('topByRate').innerHTML = topByRate.length
    ? topByRate.map((p,i) => postCardHTML(p, i, true, 'rate')).join('')
    : '<div class="section-desc">Sem posts com alcance suficiente no período.</div>';

  // Tipos de mídia
  const typeLabel = t => ({ REELS:'Reels', IMAGE:'Imagem', CAROUSEL_ALBUM:'Carrossel', VIDEO:'Vídeo' }[t] || t);
  document.getElementById('typeCards').innerHTML = (mediaTypeBreakdown||[]).map(t => `
    <div class="type-card">
      <div class="t-name">${typeLabel(t.type)} · ${t.count} posts</div>
      <div class="t-row"><span>Alcance médio</span><span>${fmtCompact(Math.round(t.avgReach))}</span></div>
      <div class="t-row"><span>Visualizações médias</span><span>${fmtCompact(Math.round(t.avgViews))}</span></div>
      <div class="t-row"><span>Taxa de engaj. média</span><span>${t.avgEngagementRate.toFixed(1)}%</span></div>
    </div>
  `).join('') || '<div class="section-desc">Sem dados suficientes.</div>';

  // Melhor horário
  document.getElementById('bestTimes').innerHTML = (bestTimes||[]).length
    ? bestTimes.map((s,i) => `
        <div class="best-time-row">
          <div class="rank">#${i+1}</div>
          <div class="info"><div class="day">${s.day}</div><div class="slot">${s.slot} · ${s.count} post(s)</div></div>
          <div class="reach">${fmtCompact(Math.round(s.avgReach))}</div>
        </div>
      `).join('')
    : '<div class="section-desc">Sem dados suficientes no período.</div>';

  // Demografia
  const barRows = (items, colorAll) => {
    if (!items || !items.length) return '<div class="section-desc">Sem dados disponíveis (a API do Instagram só libera isso para contas com público suficiente).</div>';
    const max = Math.max(...items.map(i => i.value), 1);
    return items.map(i => `
      <div class="bar-row">
        <div class="bar-label">${i.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(i.value/max*100).toFixed(1)}%"></div></div>
        <div class="bar-val">${fmtCompact(i.value)}</div>
      </div>
    `).join('');
  };
  document.getElementById('ageBars').innerHTML = `<div class="desc" style="margin-bottom:8px;">Faixa etária</div>` + barRows(audience?.age);
  document.getElementById('genderBars').innerHTML = `<div class="desc" style="margin-bottom:8px;">Gênero</div>` + barRows(audience?.gender);
  document.getElementById('countryBars').innerHTML = barRows(audience?.country);

  // Timeline de posts com miniatura
  document.getElementById('timelineScroll').innerHTML = (timeline||[]).length
    ? timeline.map(p => `
        <a class="timeline-item" href="${p.url}" target="_blank" rel="noopener">
          <div class="timeline-thumb">
            ${p.thumbnail
              ? `<img src="${p.thumbnail}" alt="" loading="lazy" onerror="handleThumbError(this)">`
              : `<div class="no-thumb">Sem imagem</div>`}
            <span class="tl-badge">${typeLabel(p.type)}</span>
          </div>
          <div class="timeline-meta">
            <div class="tl-date">${new Date(p.date).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</div>
            <div class="tl-reach">${fmtCompact(p.reach)} alcance</div>
          </div>
        </a>
      `).join('')
    : '<div class="section-desc">Sem posts no período.</div>';

  renderNotes();
}

load();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

async function exportPDF(){
  const btn = document.getElementById('exportBtn');
  const exportBtnHTML = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = 'Gerando PDF…';

  // esconde os botões de ação para não aparecerem no PDF
  const controls = document.querySelectorAll('.export-btn, .refresh-btn, .theme-toggle');
  controls.forEach(el => el.style.visibility = 'hidden');

  try {
    const { jsPDF } = window.jspdf;
    const element = document.getElementById('app');

    const canvas = await html2canvas(element, {
      backgroundColor: '#F3F4F7',
      scale: 2,
      useCORS: true,
      windowWidth: element.scrollWidth,
    });

    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pageWidth;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    const dateStr = toISODate(new Date());
    pdf.save(`dashboard-instagram-${window.__currentUsername}-${dateStr}.pdf`);
  } catch (err) {
    alert('Não foi possível gerar o PDF: ' + err.message);
  } finally {
    controls.forEach(el => el.style.visibility = 'visible');
    btn.disabled = false;
    btn.innerHTML = exportBtnHTML;
  }
}
</script>
